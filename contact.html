<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا | QuizMagic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-[#0f172a] text-slate-200">
    <div class="max-w-3xl mx-auto px-4 py-16 text-center">
        <a href="index.html" class="text-purple-500 mb-8 inline-block">← العودة للرئيسية</a>
        <h1 class="text-4xl font-bold mb-8">اتصل بنا</h1>
        <p class="text-slate-400 mb-12 text-lg">لديك سؤال؟ أو ترغب في إضافة اختبار جديد؟ نحن هنا للاستماع إليك.</p>
        
        <div class="bg-slate-800/50 p-10 rounded-[2.5rem] border border-slate-700 shadow-2xl">
            <form action="#" method="POST" class="space-y-6">
                <div>
                    <label for="name" class="sr-only">اسمك</label>
                    <input type="text" name="name" id="name" autocomplete="name" required class="block w-full rounded-md border-0 bg-slate-700/50 py-3 px-4 text-slate-200 placeholder-slate-400 focus:ring-2 focus:ring-inset focus:ring-purple-500 sm:text-sm" placeholder="اسمك">
                </div>
                <div>
                    <label for="email" class="sr-only">بريدك الإلكتروني</label>
                    <input id="email" name="email" type="email" autocomplete="email" required class="block w-full rounded-md border-0 bg-slate-700/50 py-3 px-4 text-slate-200 placeholder-slate-400 focus:ring-2 focus:ring-inset focus:ring-purple-500 sm:text-sm" placeholder="بريدك الإلكتروني">
                </div>
                <div>
                    <label for="message" class="sr-only">رسالتك</label>
                    <textarea id="message" name="message" rows="4" class="block w-full rounded-md border-0 bg-slate-700/50 py-3 px-4 text-slate-200 placeholder-slate-400 focus:ring-2 focus:ring-inset focus:ring-purple-500 sm:text-sm" placeholder="رسالتك"></textarea>
                </div>
                <button type="submit" class="flex w-full justify-center rounded-md bg-purple-600 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-purple-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-purple-600">إرسال الرسالة</button>
            </form>
            <p class="text-sm text-slate-500 mt-8">أو راسلنا مباشرة على: <a href="mailto:quizmagicsupport@gmail.com" class="text-purple-500 hover:text-purple-400 transition">quizmagicsupport@gmail.com</a></p>
        </div>

        <div class="mt-16 text-slate-500 text-sm" dir="ltr">
            <h2 class="text-2xl font-bold mb-4 text-slate-200">Contact Us</h2>
            <p class="text-slate-400 mb-8 text-lg">Have a question? Or want to suggest a new quiz? We're here to listen.</p>
            <form action="#" method="POST" class="space-y-6">
                <div>
                    <label for="name_en" class="sr-only">Your Name</label>
                    <input type="text" name="name_en" id="name_en" autocomplete="name" required class="block w-full rounded-md border-0 bg-slate-700/50 py-3 px-4 text-slate-200 placeholder-slate-400 focus:ring-2 focus:ring-inset focus:ring-purple-500 sm:text-sm" placeholder="Your Name">
                </div>
                <div>
                    <label for="email_en" class="sr-only">Your Email</label>
                    <input id="email_en" name="email_en" type="email" autocomplete="email" required class="block w-full rounded-md border-0 bg-slate-700/50 py-3 px-4 text-slate-200 placeholder-slate-400 focus:ring-2 focus:ring-inset focus:ring-purple-500 sm:text-sm" placeholder="Your Email">
                </div>
                <div>
                    <label for="message_en" class="sr-only">Your Message</label>
                    <textarea id="message_en" name="message_en" rows="4" class="block w-full rounded-md border-0 bg-slate-700/50 py-3 px-4 text-slate-200 placeholder-slate-400 focus:ring-2 focus:ring-inset focus:ring-purple-500 sm:text-sm" placeholder="Your Message"></textarea>
                </div>
                <button type="submit" class="flex w-full justify-center rounded-md bg-purple-600 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-purple-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-purple-600">Send Message</button>
            </form>
            <p class="text-sm text-slate-500 mt-8">Or email us directly at: <a href="mailto:quizmagicsupport@gmail.com" class="text-purple-500 hover:text-purple-400 transition">quizmagicsupport@gmail.com</a></p>
        </div>
    </div>
</body>
</html>
