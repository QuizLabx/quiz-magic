<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا | QuizMagic</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- SEO Meta Tags -->
    <meta name="description" content="تواصل معنا في QuizMagic. لديك سؤال أو اقتراح لاختبار جديد؟ نحن هنا للاستماع إليك.">
    <link rel="canonical" href="https://quizlabx.github.io/quiz-magic/contact.html">
    <meta name="theme-color" content="#0f172a">

    <!-- Open Graph -->
    <meta property="og:title" content="اتصل بنا | QuizMagic ✉️">
    <meta property="og:description" content="تواصل معنا في QuizMagic. نحن هنا للاستماع إليك.">
    <meta property="og:image" content="https://quizlabx.github.io/quiz-magic/assets/images/dragon.jpg">
    <meta property="og:url" content="https://quizlabx.github.io/quiz-magic/contact.html">
    <meta property="og:type" content="website">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="اتصل بنا | QuizMagic">
    <meta name="twitter:description" content="تواصل معنا في QuizMagic. نحن هنا للاستماع إليك.">
    <meta name="twitter:image" content="https://quizlabx.github.io/quiz-magic/assets/images/dragon.jpg">

    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .glass-panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 2.5rem;
            padding: 2rem;
            box-shadow: 0 10px 30px -10px var(--card-shadow);
        }
    </style>
</head>
<body class="theme-bg-primary theme-text-primary min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-12">
        <div class="flex justify-between items-center mb-12">
            <a href="index.html" class="flex items-center gap-2 text-accent-strong font-bold hover:text-accent transition-all transform hover:-translate-x-1">
                <i class="fas fa-arrow-right rtl:rotate-0 ltr:rotate-180"></i>
                <span>العودة للرئيسية</span>
            </a>
            <button onclick="toggleTheme()" id="theme-toggle" class="w-10 h-10 rounded-full flex items-center justify-center theme-bg-tertiary theme-text-primary hover:bg-accent hover:text-white transition-all">
                <i class="fas fa-moon"></i>
            </button>
        </div>

        <div class="text-center mb-16 animate-fade-in">
            <h1 class="text-5xl font-black mb-6 gradient-title">اتصل بنا</h1>
            <p class="theme-text-secondary text-xl max-w-2xl mx-auto leading-relaxed">
                لديك سؤال؟ أو ترغب في إضافة اختبار جديد؟ نحن هنا للاستماع إليك.
            </p>
        </div>

        <div class="glass-panel animate-fade-in">
            <form action="https://formspree.io/f/xykqwpjz" method="POST" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div>
                        <label class="block text-sm font-bold theme-text-muted mb-3 uppercase tracking-wider">الاسم الكامل</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 theme-text-muted"></i>
                            <input type="text" name="name" required placeholder="الاسم هنا..." 
                                class="w-full theme-bg-tertiary/20 border theme-border rounded-2xl py-4 pl-12 pr-4 theme-text-primary focus:outline-none focus:border-accent transition-all">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold theme-text-muted mb-3 uppercase tracking-wider">البريد الإلكتروني</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 theme-text-muted"></i>
                            <input type="email" name="email" required placeholder="example@mail.com" 
                                class="w-full theme-bg-tertiary/20 border theme-border rounded-2xl py-4 pl-12 pr-4 theme-text-primary focus:outline-none focus:border-accent transition-all">
                        </div>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-bold theme-text-muted mb-3 uppercase tracking-wider">الرسالة</label>
                    <textarea name="message" rows="6" required placeholder="كيف يمكننا مساعدتك؟" 
                        class="w-full theme-bg-tertiary/20 border theme-border rounded-2xl py-4 px-6 theme-text-primary focus:outline-none focus:border-accent transition-all"></textarea>
                </div>

                <button type="submit" class="w-full btn-primary font-black py-5 rounded-2xl transition-all transform active:scale-[0.98] flex items-center justify-center gap-3 text-xl">
                    <i class="fas fa-paper-plane"></i>
                    <span>إرسال الرسالة</span>
                </button>
            </form>

            <div class="mt-12 pt-12 border-t theme-border text-center">
                <p class="theme-text-muted mb-4">أو راسلنا مباشرة عبر البريد الإلكتروني:</p>
                <a href="mailto:quizmagicsupport@gmail.com" class="text-2xl font-bold text-accent hover:text-accent transition-colors">
                    quizmagicsupport@gmail.com
                </a>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        // Override applyTheme to work on this page
        const originalApplyTheme = applyTheme;
        applyTheme = function(theme) {
            originalApplyTheme(theme);
            const toggleBtn = document.getElementById('theme-toggle');
            if (toggleBtn) {
                toggleBtn.innerHTML = theme === 'dark' ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
            }
        };
    </script>
</body>
</html>
