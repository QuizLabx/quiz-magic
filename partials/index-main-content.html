<!-- Hero Section -->
<section id="hero-section" class="text-center mb-12">
    <h2 id="hero-title" class="text-4xl md:text-5xl font-bold mb-4 bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent pb-2">
        اكتشف أسرار شخصيتك الخفية
    </h2>
    <p id="hero-subtitle" class="text-slate-400 text-lg max-w-2xl mx-auto">
        اختر اختبارك المفضل وابدأ رحلة ممتعة في عالم الخيال والنتائج المذهلة.
    </p>
</section>

<!-- Quiz Grid -->
<div id="quiz-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    <!-- Cards will be generated by JS -->
</div>

<!-- Loading Screen (Hidden by default) -->
<div id="loading-screen" class="hidden fixed inset-0 z-50 bg-[#0f172a] flex flex-col items-center justify-center transition-opacity duration-500 opacity-0">
    <div class="text-center p-6">
        <div class="mb-8 text-7xl text-purple-500 animate-pulse">
            <i class="fas fa-magic"></i>
        </div>
        <h1 id="loading-text" class="text-3xl font-bold mb-4 bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent pb-2"></h1>
        <p id="loading-subtitle" class="text-slate-400 text-lg max-w-2xl mx-auto"></p>
    </div>
</div>

<!-- Quiz Container (Hidden by default) -->
<div id="quiz-container" class="hidden max-w-3xl mx-auto bg-slate-800/40 p-6 md:p-10 rounded-3xl border border-slate-700 shadow-2xl glass">
    <!-- Quiz Engine content will be injected here -->
</div>

<!-- Result Container (Hidden by default) -->
<div id="result-container" class="hidden max-w-3xl mx-auto text-center">
    <!-- Results will be injected here -->
</div>
