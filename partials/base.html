<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMagic | اكتشف أسرار شخصيتك</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <!-- SEO & Social Media Sharing (Open Graph) -->
    <meta name="description" content="اكتشف كائنك الأسطوري الحقيقي بناءً على تحليل نفسي عميق. هل أنت تنين، عنقاء، أم كراكن؟">
    <meta property="og:title" content="كويز ماجيك: ما هو كائنك الأسطوري؟ 🐉">
    <meta property="og:description" content="اختبار تفاعلي يكشف القوى الأسطورية الكامنة في شخصيتك. جربه الآن!">
    <meta property="og:image" content="https://quizlabx.github.io/quiz-magic/assets/images/dragon.jpg">
    <meta property="og:url" content="https://quizlabx.github.io/quiz-magic/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="كويز ماجيك: ما هو كائنك الأسطوري؟ 🐉">
    <meta name="twitter:description" content="اكتشف كائنك الأسطوري الحقيقي الآن!">
    <meta name="twitter:image" content="https://quizlabx.github.io/quiz-magic/assets/images/dragon.jpg">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Cairo -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen flex flex-col">

    <!-- Language Selector Screen -->
    <div id="language-screen" class="fixed inset-0 z-50 bg-[#0f172a] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="text-center p-6">
            <div class="mb-8 text-7xl text-purple-500 animate-pulse">
                <i class="fas fa-magic"></i>
            </div>
            <h1 class="text-3xl font-bold mb-8">اختر اللغة / Choose Language</h1>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="setLanguage(\'ar\')" class="bg-purple-600 hover:bg-purple-700 text-white px-12 py-4 rounded-full font-bold text-xl transition-all transform hover:scale-105 shadow-lg shadow-purple-500/20">العربية</button>
                <button onclick="setLanguage(\'en\')" class="bg-slate-700 hover:bg-slate-600 text-white px-12 py-4 rounded-full font-bold text-xl transition-all transform hover:scale-105">English</button>
            </div>
        </div>
    </div>

    <div id="header-placeholder"></div>

    <!-- Main Content Placeholder -->
    <main id="main-content-placeholder" class="flex-grow container mx-auto px-4 py-8"></main>

    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <!-- Chart.js for Radar Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="assets/js/quizzes.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="assets/js/loadPartials.js"></script>
    <script src="service-worker-registration.js"></script>
</body>
</html>
